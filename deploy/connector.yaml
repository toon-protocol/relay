# =============================================================================
# relay deploy — TOON connector (payment proxy) in front of the oblivious relay
# =============================================================================
# BAKED into the relay-connector image at /app/config/connector.yaml (see
# deploy/Dockerfile) — NOT bind-mounted. TLS is terminated by the deployment
# environment (no Caddy in this compose).
#
# Topology (canonical TOON relay deployment):
#
#   payer ──POST /ilp (3000)──▶ connector ──POST /write──▶ relay:3100  (paid store; PRIVATE)
#                                  (terminates the payment)   (oblivious relay)
#   reader ──wss REQ (free)─────────────────────────────────▶ relay:7100  (Nostr reads; PUBLIC)
#
# - The connector's edge is `POST /ilp` (ILP-over-HTTP, RFC-0035). A paid PREPARE
#   addressed to `g.connector.relay.*` terminates here; the literal HTTP request
#   carried in the PREPARE `data` (`POST /write`, body `{event}`) is
#   reverse-proxied to `upstream` (the relay's PRIVATE store port 3100), and the
#   relay's HTTP response is returned in the ILP FULFILL `data`. The relay never
#   sees ILP / settlement.
# - An UNPAID PREPARE is REJECTED — never reaches the relay.
# - FREE READS do NOT come through here: readers hit the relay's Nostr WS read
#   port (7100) directly.
#
# SETTLEMENT IDENTITY: ships with the anvil account-0 deterministic key as a
# working DEVNET FALLBACK (account 0 is pre-funded on the shared devnet) and its
# address as the route's settlement address. To run under YOUR OWN identity, set
# TOON_MNEMONIC in .env — it is derived at boot and OVERWRITES the `keyId` below;
# you must then also update routes[].settlementAddresses.evm to the derived EVM
# address (see README). The config loader does NOT interpolate ${...}; every
# value here is literal.
# =============================================================================

nodeId: connector
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

# ── Admin REST API ──────────────────────────────────────────────────────────
# Binds inside the container only; the compose service does NOT publish 8081.
adminApi:
  enabled: true
  host: 0.0.0.0
  port: 8081
  allowedIPs:
    - 172.16.0.0/12 # docker user-defined-bridge default pool
    - 192.168.0.0/16 # fallback when 172.16/12 is occupied

# NOTE: deliberately NO `localDelivery:` block. A global localDelivery handler
# would short-circuit the per-route HttpProxyHandler. Leaving it unset lets the
# terminated route below drive the HTTP reverse-proxy to the relay store.

settlement:
  connectorFeePercentage: 0.1
  enableSettlement: true
  tigerBeetleClusterId: 0
  tigerBeetleReplicas: []
  thresholds:
    defaultThreshold: '5000'
    pollingInterval: 100

# ── Settlement / chain providers ─────────────────────────────────────────────
# A single EVM entry pointing at the SHARED LIVE DEVNET (chainId 31337, the same
# deterministic anvil chain). The registry + Mock USDC (6-dp) are deployed
# deterministically, so these DeployLocal addresses are identical on the devnet.
#
# rpcUrl is LITERAL (no ${} interpolation). The devnet serves a self-signed TLS
# cert, so the connector container runs with NODE_TLS_REJECT_UNAUTHORIZED=0
# (set in docker-compose.yml) for its RPC/faucet calls. DEVNET-ONLY.
chainProviders:
  - chainType: evm
    chainId: evm:31337
    rpcUrl: https://evm-rpc.devnet.toonprotocol.dev
    registryAddress: '0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512'
    tokenAddress: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
    keyId: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
    settlementOptions:
      threshold: '5000'
      pollingIntervalMs: 100
      settlementTimeoutSecs: 3600
      initialDepositMultiplier: 2
      ledgerSnapshotPath: ./data/ledger-connector.json

peers: []

# ── Routes ──────────────────────────────────────────────────────────────────
# ONE terminated route. `upstream` points at the relay's oblivious-mode HTTP
# store port (3100) over the compose network by service name — the host can never
# reach `relay:3100` directly (that port is NOT published), which is what enforces
# the privacy invariant: paid writes MUST flow through the connector. The store
# endpoint (`POST /write`, body `{event}`) is carried in the forwarded HTTP
# envelope; this only needs the base host:port.
#
# `settlementAddresses.evm` is anvil account-0's address (matches the keyId above).
# With TOON_MNEMONIC set, change it to the mnemonic-derived EVM address (boot log).
routes:
  - prefix: g.connector.relay
    nextHop: connector
    upstream: http://relay:3100
    price: '1000'
    chains:
      - evm
    ilpAddress: g.connector.relay
    settlementAddresses:
      evm: '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'
