# =============================================================================
# relay deploy — TOON connector (payment proxy) in front of the oblivious relay
# =============================================================================
# BAKED into the relay-connector image at /app/config/connector.yaml (see
# deploy/Dockerfile) — NOT bind-mounted. TLS is terminated by the deployment
# environment (no Caddy in this compose).
#
# Topology (canonical TOON relay deployment):
#
#   payer ──POST /ilp (3000)──▶ connector ──POST /write──▶ relay:3100  (paid store; PRIVATE)
#                                  (terminates the payment)   (oblivious relay)
#   reader ──wss REQ (free)─────────────────────────────────▶ relay:7100  (Nostr reads; PUBLIC)
#
# - The connector's edge is `POST /ilp` (ILP-over-HTTP, RFC-0035). A paid PREPARE
#   addressed to `g.connector.relay.*` terminates here; the literal HTTP request
#   carried in the PREPARE `data` (`POST /write`, body `{event}`) is
#   reverse-proxied to `upstream` (the relay's PRIVATE store port 3100), and the
#   relay's HTTP response is returned in the ILP FULFILL `data`. The relay never
#   sees ILP / settlement.
# - An UNPAID PREPARE is REJECTED — never reaches the relay.
# - FREE READS do NOT come through here: readers hit the relay's Nostr WS read
#   port (7100) directly.
#
# SETTLEMENT IDENTITY: ships with the anvil account-0 deterministic key as a
# working DEVNET FALLBACK (account 0 is pre-funded on the shared devnet) and its
# address as the route's settlement address. To run under YOUR OWN identity, set
# TOON_MNEMONIC in .env — it is derived at boot and OVERWRITES the `keyId` below;
# you must then also update routes[].settlementAddresses.evm to the derived EVM
# address (see README). The config loader does NOT interpolate ${...}; every
# value here is literal.
# =============================================================================

nodeId: connector
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

# ── Admin REST API ──────────────────────────────────────────────────────────
# Binds inside the container only; the compose service does NOT publish 8081.
adminApi:
  enabled: true
  host: 0.0.0.0
  port: 8081
  allowedIPs:
    - 172.16.0.0/12 # docker user-defined-bridge default pool
    - 192.168.0.0/16 # fallback when 172.16/12 is occupied

# NOTE: deliberately NO `localDelivery:` block. A global localDelivery handler
# would short-circuit the per-route HttpProxyHandler. Leaving it unset lets the
# terminated route below drive the HTTP reverse-proxy to the relay store.

settlement:
  connectorFeePercentage: 0.1
  enableSettlement: true
  tigerBeetleClusterId: 0
  tigerBeetleReplicas: []
  thresholds:
    defaultThreshold: '5000'
    pollingInterval: 100

# ── Settlement / chain providers ─────────────────────────────────────────────
# A single EVM entry pointing at the SHARED LIVE DEVNET (chainId 31337, the same
# deterministic anvil chain). The registry + Mock USDC (6-dp) are deployed
# deterministically, so these DeployLocal addresses are identical on the devnet.
#
# rpcUrl is LITERAL (no ${} interpolation). The devnet serves a self-signed TLS
# cert, so the connector container runs with NODE_TLS_REJECT_UNAUTHORIZED=0
# (set in docker-compose.yml) for its RPC/faucet calls. DEVNET-ONLY.
chainProviders:
  - chainType: evm
    chainId: evm:31337
    rpcUrl: https://evm-rpc.devnet.toonprotocol.dev
    registryAddress: '0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512'
    tokenAddress: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
    keyId: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
    settlementOptions:
      threshold: '5000'
      pollingIntervalMs: 100
      settlementTimeoutSecs: 3600
      initialDepositMultiplier: 2
      ledgerSnapshotPath: ./data/ledger-connector.json

# ── Peers ─────────────────────────────────────────────────────────────────────
# This relay-connector ABSORBS the g.proxy apex role (it replaces the old toon-box
# apex). It is the g.proxy entry point AND a real ILP hop: it terminates
# g.proxy.relay (paid Nostr writes → relay:3100), forwards g.proxy.relay.store to
# the store box (EARNING connectorFeePercentage on the hop), and forwards the
# direct g.proxy.store to the store box too.
#
# SETTLEMENT IDENTITY: reuse the apex's demo seed so existing client channels
# (to g.proxy.store / g.proxy.relay.store) survive the cutover. Set in .env:
#   TOON_MNEMONIC="giant goat guide develop boy wolf target embody leave sunny paddle neutral"
#   → EVM 0xC0E55cD2E967a4F625627DaE5d4946f54267C7ab (NIP-06 path m/44'/1237'/0'/0/0)
# It is DISTINCT from the store (0x1f4E12…), so the relay-connector↔store-box
# channel settles correctly (no self-pay).
peers:
  - id: store-box
    url: wss://proxy.store.devnet.toonprotocol.dev:443
    relation: peer
    authToken: ''
    chain: evm:31337
    # The store box's settlement address (its distinct mnemonic, NIP-06 path).
    settlementAddress: '0x1f4E12A9357a3c46477F95F6f9813eeBF49f106e'

# ── Routes ──────────────────────────────────────────────────────────────────
# THREE routes — this node is the g.proxy entry point + the relay hop:
#   1. g.proxy.relay        → TERMINATE, reverse-proxy POST /write → relay:3100
#                             (paid Nostr writes; relay:3100 is never host-published).
#   2. g.proxy.relay.store  → FORWARD to the store-box peer (the relay hop; this
#                             node earns connectorFeePercentage on it).
#   3. g.proxy.store        → FORWARD to the store-box peer (the absorbed-apex
#                             direct path; clients can also dial the store box edge).
# Longest-prefix: g.proxy.relay.store (more specific) forwards; the rest of
# g.proxy.relay terminates at the relay.
#
# settlementAddresses.evm is this node's OWN address (the fee recipient) =
# the apex demo identity 0xC0E55… set via TOON_MNEMONIC above.
routes:
  - prefix: g.proxy.relay
    nextHop: connector
    upstream: http://relay:3100
    price: '1000'
    chains:
      - evm
    ilpAddress: g.proxy.relay
    settlementAddresses:
      evm: '0xC0E55cD2E967a4F625627DaE5d4946f54267C7ab'

  - prefix: g.proxy.relay.store
    nextHop: store-box
    price: '1000'
    chains:
      - evm
    ilpAddress: g.proxy.relay.store
    settlementAddresses:
      evm: '0xC0E55cD2E967a4F625627DaE5d4946f54267C7ab'

  - prefix: g.proxy.store
    nextHop: store-box
    price: '1000'
    chains:
      - evm
    ilpAddress: g.proxy.store
    settlementAddresses:
      evm: '0xC0E55cD2E967a4F625627DaE5d4946f54267C7ab'

# ── Self-announce (kind:10032 IlpPeerInfo) ────────────────────────────────────
# Closes the discovery gap behind toon-protocol/relay#37 + toon-protocol/store#22.
# This connector is THE g.proxy apex, so it is the single emitter for the whole
# topology: it periodically builds, signs, and republishes a fresh kind:10032
# announcement to the relay it fronts (relay:3100 POST /write — the same private
# store it reverse-proxies paid writes to). The event then shows up on the relay's
# free read WS, so a client holding ONLY the genesis seed can discover the publish
# AND store routes out of band and drop hardcoded publishDestination/storeDestination.
#
# - Signed with this node's NIP-06 Nostr key (derived from TOON_MNEMONIC — the same
#   identity it settles with; NO new secret). The store box does NOT self-announce:
#   its private /write is not reachable across boxes, and the apex already advertises
#   the g.proxy.store route here (clients always pay the apex first hop, so the apex
#   settlement address advertised below is the right one for every route).
# - NIP-40 expiration is refreshed at ~half the TTL (refreshIntervalSecs → TTL = 2x),
#   so the announcement is CONTINUOUSLY fresh and never lapses while the node is up.
# - `routes` rides in the announcement CONTENT (not a core wire-type change).
#
# REQUIRES a connector image that includes the self-announce feature
# (toon-protocol/connector#265). Bump CONNECTOR_TAG (.env / Dockerfile) to a release
# that carries it; older images ignore this block.
selfAnnounce:
  enabled: true
  # The relay's PRIVATE paid-write store (compose-network only; never host-published).
  writeUrl: http://relay:3100/write
  refreshIntervalSecs: 300
  # Public-facing endpoints the connector can't infer (TLS terminated by the env).
  btpEndpoint: wss://proxy.devnet.toonprotocol.dev:443
  httpEndpoint: https://proxy.devnet.toonprotocol.dev/ilp
  relayUrl: wss://relay-ws.devnet.toonprotocol.dev
  assetCode: USDC
  assetScale: 6
  # Route hints carried in announcement content so clients learn routing out of band.
  routes:
    publish: g.proxy.relay
    store: g.proxy.store
