name: Publish relay image

# Builds the oblivious-capable relay image (packages/relay/Dockerfile) and
# pushes it to GHCR. Unblocks connector #221/#222: their app-behind-terminator
# compose references ghcr.io/toon-protocol/relay:oblivious.
#
# The `oblivious` tag is (re)published on every push to main and on release
# tags, so the connector compose's default RELAY_IMAGE always resolves to the
# latest relay#24 contract. Version tags (vX.Y.Z) additionally publish semver
# tags for pinning.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency: publish-relay-image-${{ github.ref }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/relay
          # `oblivious` is the connector compose default and tracks main; semver
          # tags publish on vX.Y.Z; sha tags give an immutable handle.
          tags: |
            type=raw,value=oblivious
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
