name: Publish relay image

# Builds the relay image (packages/relay/Dockerfile) and pushes it to GHCR.
# Unblocks connector #221/#222: their app-behind-terminator compose points
# RELAY_IMAGE at this image.
#
# `latest` is (re)published on every push to main; version tags (vX.Y.Z) also
# publish semver tags for pinning, plus an immutable sha tag.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency: publish-relay-image-${{ github.ref }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/relay
          # `latest` tracks main; semver tags publish on vX.Y.Z; sha tags give
          # an immutable handle.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
