name: Agent image

# Minimal build-only check for the sandcastle agent container image.
# Proves the `.sandcastle/Dockerfile` (node:22-bookworm + gh + Claude Code CLI
# + corepack/pnpm) builds. This is NOT the label->runner: the
# agent:implement / agent:review triggered runner is a later slice (#184).

on:
  pull_request:
    paths:
      - '.sandcastle/**'
      - '.github/workflows/agent-image.yml'
  workflow_dispatch:

jobs:
  build-image:
    name: Build sandcastle agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Docker is preinstalled on ubuntu-latest GitHub-hosted runners.
      # `sandcastle docker build-image` builds .sandcastle/Dockerfile,
      # defaulting the AGENT_UID/AGENT_GID build args to the runner's uid/gid.
      - name: Build agent image
        run: npx --yes @ai-hero/sandcastle@0.12.0 docker build-image

      - name: Gate performance no-regression guard (image size)
        run: |
          SIZE=$(docker image inspect sandcastle:relay --format='{{.Size}}')
          BASELINE=$(jq -r '.performance.dockerImageSizeBytes' .sandcastle/gate-baseline.json)
          echo "Agent image size: ${SIZE} bytes"
          if [ "$BASELINE" = "null" ]; then
            echo "::notice::No frozen image-size baseline yet in .sandcastle/gate-baseline.json — recording ${SIZE} bytes for a follow-up baseline-update commit, not enforcing."
            exit 0
          fi
          TOLERANCE=$(jq -r '.regressionTolerancePercent' .sandcastle/gate-baseline.json)
          LIMIT=$((BASELINE + BASELINE * TOLERANCE / 100))
          echo "Frozen baseline ${BASELINE} bytes, +${TOLERANCE}% limit ${LIMIT} bytes"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Agent image size regressed vs .sandcastle/gate-baseline.json: ${SIZE} > ${LIMIT} bytes"
            exit 1
          fi

      - name: Verify toolchain inside image
        run: |
          docker run --rm --entrypoint bash sandcastle:relay -lc '
            set -e
            node --version
            gh --version | head -1
            # pnpm resolves via corepack; the mounted repo pins pnpm@8.15.9
            # through its packageManager field at runtime.
            corepack --version
            test "$(whoami)" = "agent"
            test -x /home/agent/.local/bin/claude
          '
