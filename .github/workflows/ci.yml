name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Start gate timer
        id: gate-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Lint (frozen correctness baseline)
        run: |
          BASELINE_WARNINGS=$(jq -r '.correctness.eslintWarnings' .sandcastle/gate-baseline.json)
          echo "Failing on any eslint error, or more than the frozen $BASELINE_WARNINGS warnings."
          pnpm exec eslint . --max-warnings "$BASELINE_WARNINGS"

      - run: pnpm run typecheck

      - run: pnpm -r build

      - run: pnpm -r test --if-present

      - name: Gate speed no-regression guard
        run: |
          END=$(date +%s)
          ELAPSED=$((END - ${{ steps.gate-timer.outputs.start }}))
          BASELINE_SECONDS=$(jq -r '.speed.gateWallClockSeconds' .sandcastle/gate-baseline.json)
          TOLERANCE=$(jq -r '.regressionTolerancePercent' .sandcastle/gate-baseline.json)
          LIMIT=$((BASELINE_SECONDS + BASELINE_SECONDS * TOLERANCE / 100))
          echo "Gate took ${ELAPSED}s (frozen baseline ${BASELINE_SECONDS}s, +${TOLERANCE}% limit ${LIMIT}s)"
          if [ "$ELAPSED" -gt "$LIMIT" ]; then
            echo "::error::Gate speed regressed vs .sandcastle/gate-baseline.json: ${ELAPSED}s > ${LIMIT}s"
            exit 1
          fi

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --no-frozen-lockfile && pnpm build"
