name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@734088efddca47cf44ff8a09289c6d0e51b73218 # v0.12.0
        with:
          enable-cache: true

      - run: devbox run -- pnpm install --no-frozen-lockfile

      - run: devbox run -- pnpm lint
        continue-on-error: true

      - run: devbox run -- pnpm -r build

      - run: devbox run -- pnpm -r test --if-present
